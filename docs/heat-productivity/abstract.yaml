title: Heat & Productivity
status: draft
version: 0.1

summary: >
  Heat affects work capacity, cognition, comfort and dignity.
  Solvinter studies how cool, clean and beautiful workspaces
  increase human capability in tropical operating conditions.

sections:
  - title: Core observation
    body: >
      In Ghana, heat is not a background condition. It is part of the
      economic environment. Any serious digital work node must treat
      cooling, air quality and ergonomics as productive infrastructure.

claims:
  - Cooling is not luxury; it is work infrastructure.
  - Human concentration depends on temperature, air quality, light and rhythm.
  - Ethical work design must include bodily comfort.

questions:
  - What is the minimum viable cooling system for Cow Lane?
  - Can passive cooling reduce dependence on air conditioning?
  - How does heat affect digital work quality over a full day?

references: []