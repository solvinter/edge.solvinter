title: Ergonomics / Arbetsmiljö
status: draft
version: 0.1
summary: >
  Ergonomics is where technology, furniture, tools, architecture and design
  meet human physiology. For Solvinter, ergonomics includes air, temperature,
  light, sound, furniture, input devices, digital interfaces and recovery.

sections:
  - title: Core idea
    body: >
      A workspace should not force the body to adapt to bad technology.
      Technology should be designed around the body, attention, rest and
      long-term human capability.

claims:
  - Cool clean air is ergonomics.
  - Light and sound are ergonomics.
  - Furniture and input devices are part of technological ethics.
  - Recovery space belongs inside the work environment.

questions:
  - What does a good digital workspace require in Accra?
  - How do heat, air quality and noise affect focus?
  - What is the minimum viable ergonomic standard for Cow Lane?

references: []
